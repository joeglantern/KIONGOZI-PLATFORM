version: '3.9'

services:
  api:
    build: .
    image: kiongozi-api:latest
    container_name: kiongozi-api
    restart: always
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3001
    expose:
      - "3001"
    networks:
      - kiongozi-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: kiongozi-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/log/nginx:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    networks:
      - kiongozi-net

networks:
  kiongozi-net:
    driver: bridge
